syntax = "proto3";

package Proregia.Bluetooth.Contracts.Proto;

message Metrics {
    string platform = 1;
    string model = 2;
    string os_type = 3;
    string os_version = 4;
    string manufacturer = 5;
    string device_serial = 6;
    string application_name = 7;
    string application_package = 8;
    string library_version = 9;
    bool xamarin = 10;
}

message EncryptKeyRequest {
  string challenge = 1;
  string pump_public_key = 2;
  string app_public_key = 3;
  string bt_address = 4;
  string message_attestation_object = 5;
  string nonce = 6;
  Metrics metrics = 7;
}

message EncryptKeyResponse {
  string encrypted_bytes = 1;
}

service EncryptKey {
  rpc Send(EncryptKeyRequest) returns (EncryptKeyResponse);
}

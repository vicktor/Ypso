syntax = "proto3";

package Proregia.Bluetooth.Contracts.Proto;

message Metrics {
    string platform = 1;
    string model = 2;
    string os_type = 3;
    string os_version = 4;
    string manufacturer = 5;
    string device_serial = 6;
    string application_name = 7;
    string application_package = 8;
    string library_version = 9;
    bool xamarin = 10;
}

message DeviceIdentifier {
    string device_id = 1;
    string bt_address = 2;
    Metrics metrics = 3;
}

message ServerNonce {
    string server_nonce = 1;
}

service NonceRequest {
    rpc Send(DeviceIdentifier) returns (ServerNonce);
}
